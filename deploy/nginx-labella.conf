# ============================================================
# Nginx — reverse proxy vers le serveur Next.js (port 3000)
# À copier dans /etc/nginx/sites-available/labella puis activer.
# Certbot ajoutera automatiquement le bloc HTTPS (443) + la redirection.
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name labellapizzeria.fr www.labellapizzeria.fr;  # <-- votre domaine

    # Taille max des requêtes (uploads médiathèque, etc.)
    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # Assets immuables Next (hashés) — cache long
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images publiques
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Application
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # IMPORTANT : on ÉCRASE X-Forwarded-For avec l'IP réelle (pas d'append)
        # pour empêcher un client de falsifier son IP et contourner le rate-limit.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
